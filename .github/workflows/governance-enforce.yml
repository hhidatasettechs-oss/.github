name: governance-full-enforce

on:
  push:
  pull_request:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Org Scan (Decision Boundary + Integrity)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          org="hhidatasettechs-oss"
          repos=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/orgs/$org/repos?per_page=100 | jq -r '.[].clone_url')

          mkdir -p repos telemetry
          fail=0

          for repo in $repos; do
            name=$(basename $repo .git)
            git clone --depth=1 $repo repos/$name 2>/dev/null || continue

            status="pass"
            reason=""

            # --- README Decision Boundary ---
            if [ ! -f repos/$name/README.md ] || \
               ! grep -q "Time turns behavior into infrastructure" repos/$name/README.md || \
               ! grep -q "Behavior is the most honest data there is" repos/$name/README.md; then
              status="fail"
              reason="decision_boundary"
            fi

            # --- LICENSE VALIDATION ---
            if [ "$status" = "pass" ] && [ ! -f repos/$name/LICENSE ]; then
              status="fail"
              reason="license_missing"
            fi

            # --- CHECKSUM ENFORCEMENT ---
            if [ "$status" = "pass" ] && [ -f repos/$name/CHECKSUMS.sha256 ]; then
              (cd repos/$name && sha256sum -c CHECKSUMS.sha256 >/dev/null 2>&1) || {
                status="fail"
                reason="checksum_mismatch"
              }
            fi

            # --- DATASET INTEGRITY ---
            if [ "$status" = "pass" ] && [ -d repos/$name/datasets ]; then
              count=$(find repos/$name/datasets -type f | wc -l)
              if [ "$count" -eq 0 ]; then
                status="fail"
                reason="empty_dataset"
              fi
            fi

            # --- TELEMETRY ---
            echo "{ \"repo\": \"$name\", \"status\": \"$status\", \"reason\": \"$reason\" }" >> telemetry/results.json

            if [ "$status" = "fail" ]; then
              fail=1
            fi
          done

          # --- STOP AUTHORITY ---
          if [ $fail -eq 1 ]; then
            echo "{"
            echo "\"event\": \"governance_check\","
            echo "\"actor\": \"${{ github.actor }}\","
            echo "\"decision_boundary\": \"fail\","
            echo "\"action\": \"block\","
            echo "\"outcome\": \"failure\","
            echo "\"escalation_status\": \"active\","
            echo "\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
            echo "}"
            exit 1
          fi

      - name: Upload Telemetry
        uses: actions/upload-artifact@v4
        with:
          name: governance-telemetry
          path: telemetry/results.json

      - name: Success Telemetry
        run: |
          echo "{"
          echo "\"event\": \"governance_check\","
          echo "\"actor\": \"${{ github.actor }}\","
          echo "\"decision_boundary\": \"pass\","
          echo "\"action\": \"allow\","
          echo "\"outcome\": \"success\","
          echo "\"escalation_status\": \"none\","
          echo "\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\""
          echo "}"
