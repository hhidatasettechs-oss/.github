name: HHI Governance Enforcement

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Governance Enforcement
        run: |
          chmod +x governance/scripts/enforce_governance.sh
          bash governance/scripts/enforce_governance.sh
